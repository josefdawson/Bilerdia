<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilerdia ❖ Create Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="title">Create a Post</h1>
    <div id="form-container">
        <label>Title</label>
        <input id="post-title" placeholder="Post title">

        <label>Description</label>
        <textarea id="post-description" placeholder="What's on your mind?" rows="5"></textarea>

        <label>Tags (comma separated)</label>
        <input id="post-tags" placeholder="e.g. travel, food, tech">

        <label>Genre</label>
        <select id="post-genre">
            <option value="">None</option>
            <option value="News">News</option>
            <option value="Silly">Silly</option>
            <option value="Important">Important</option>
            <option value="Music">Music</option>
            <option value="Others">Others</option>
        </select>
        <div id="custom-genre-section" style="display:none;">
            <input id="custom-genre" placeholder="Enter custom genre" style="width:100%;padding:8px;border-radius:6px;border:1px solid #555;background:rgb(50,50,50);color:#ddd;box-sizing:border-box;">
        </div>

        <label>Images / Videos</label>
        <input type="file" id="media-input" accept="image/*,video/*" multiple>

        <div id="preview"></div>

        <label><input type="checkbox" id="poll-toggle"> Add Poll</label>
        <div id="poll-section" style="display:none;">
            <div id="poll-options"></div>
            <button type="button" id="add-poll-option">+ Add Option</button>
        </div>

        <div id="actions">
            <button id="cancel-btn">Cancel</button>
            <button id="submit-btn">Post</button>
        </div>
    </div>
    <script src="../Shared/supabase.js"></script>
    <script src="../Shared/sync.js"></script>
    <script src="main.js"></script>
</body>
</html>
